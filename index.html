<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
.carousel-wrapper { position: relative; width: 100%; max-width: 820px; }
.overflow-clip { overflow: hidden; }
.carousel-track { display: flex; transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
.card { flex: 0 0 240px; margin: 0 12px; background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.12); text-align: center; transition: transform 0.3s, box-shadow 0.3s; }
.card.active { transform: scale(1.04); box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
.card img { width: 100%; height: 260px; object-fit: cover; object-position: top center; display: block; }
.card-body { padding: 16px 14px 20px; }
.card-body h2 { font-size: 1.05rem; font-weight: 700; color: #8B0000; margin-bottom: 5px; font-family: "Segoe UI", Arial, sans-serif; }
.card-body .role { font-size: 0.82rem; color: #555; margin-bottom: 10px; line-height: 1.4; font-family: "Segoe UI", Arial, sans-serif; }
.card-body a { display: inline-block; font-size: 0.78rem; color: #8B0000; text-decoration: none; border: 1.5px solid #8B0000; border-radius: 20px; padding: 4px 12px; transition: background 0.2s, color 0.2s; font-family: "Segoe UI", Arial, sans-serif; }
.card-body a:hover { background: #8B0000; color: #fff; }
.nav-btn { position: absolute; top: 45%; transform: translateY(-50%); background: rgba(255,255,255,0.85); border: 1px solid rgba(0,0,0,0.15); color: #333; width: 36px; height: 36px; border-radius: 50%; font-size: 1.1rem; cursor: pointer; z-index: 10; transition: background 0.2s; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
.nav-btn:hover { background: #fff; }
.nav-btn.prev { left: -18px; }
.nav-btn.next { right: -18px; }
.dots { display: flex; justify-content: center; gap: 7px; margin-top: 18px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(0,0,0,0.2); cursor: pointer; transition: background 0.3s, transform 0.2s; }
.dot.active { background: #8B0000; transform: scale(1.3); }
</style>

let current = 0;
const track = document.getElementById('track');
const dotsEl = document.getElementById('dots');

function copyEmail(btn, email) {
  navigator.clipboard.writeText(email).then(function() {
    btn.textContent = "Copied!";
    btn.classList.add("copied");
    setTimeout(function() {
      btn.textContent = email;
      btn.classList.remove("copied");
    }, 2000);
  });
}

PEOPLE.forEach(function(p, i) {
  var card = document.createElement("div");
  card.className = "card" + (i === 0 ? " active" : "");
  var btn = document.createElement("button");
  btn.className = "copy-btn";
  btn.textContent = p.email;
  btn.onclick = (function(b, e) { return function() { copyEmail(b, e); }; })(btn, p.email);
  var cardBody = document.createElement("div");
  cardBody.className = "card-body";
  var h2 = document.createElement("h2");
  h2.textContent = p.name;
  var role = document.createElement("div");
  role.className = "role";
  role.textContent = p.title;
  var img = document.createElement("img");
  img.src = p.img;
  img.alt = p.name;
  cardBody.appendChild(h2);
  cardBody.appendChild(role);
  cardBody.appendChild(btn);
  card.appendChild(img);
  card.appendChild(cardBody);
  track.appendChild(card);
  var dot = document.createElement("div");
  dot.className = "dot" + (i === 0 ? " active" : "");
  dot.onclick = (function(idx) { return function() { goTo(idx); }; })(i);
  dotsEl.appendChild(dot);
});

function goTo(idx) {
  current = (idx + PEOPLE.length) % PEOPLE.length;
  const cw = 264;
  const wrapperW = track.parentElement.offsetWidth;
  const offset = current * cw - (wrapperW / 2 - 120);
  track.style.transform = 'translateX(-' + Math.max(0, offset) + 'px)';
  document.querySelectorAll('.card').forEach((c, i) => c.classList.toggle('active', i === current));
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
}

function move(dir) { goTo(current + dir); }
setInterval(() => move(1), 4000);
goTo(0);
</script>
